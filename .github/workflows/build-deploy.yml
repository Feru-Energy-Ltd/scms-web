# Build scms-web on push to main and push the image to Docker Hub.
#
# Required repository variables (or prod environment variables):
#   NEXT_PUBLIC_API_BASE_URL
#   NEXT_PUBLIC_CSMS_PATH_PREFIX      (e.g. /csms)
#   NEXT_PUBLIC_PAYMENT_PATH_PREFIX   (e.g. /payment)
#   NEXT_PUBLIC_AUTH_PATH_PREFIX      (e.g. /auth)

name: Build and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: scms-web

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build-and-push:
    name: Build & Push to Docker Hub
    needs: lint
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image version
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "version=${PACKAGE_VERSION}-${GIT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_CSMS_PATH_PREFIX=${{ vars.NEXT_PUBLIC_CSMS_PATH_PREFIX }}
            NEXT_PUBLIC_PAYMENT_PATH_PREFIX=${{ vars.NEXT_PUBLIC_PAYMENT_PATH_PREFIX }}
            NEXT_PUBLIC_AUTH_PATH_PREFIX=${{ vars.NEXT_PUBLIC_AUTH_PATH_PREFIX }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
